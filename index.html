<!DOCTYPE html>
<html lang="es">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Crédito</title>
    <link rel="stylesheet" href="simulador.css">
    <script src="funciones.js"></script>
    <script src="simulador.js"></script>
</head>
 
<body>
    <div class="container">
        <img src="dog_bank.png" alt="Logo de la empresa" class="logo">
        <h1>- Banco L´Barbare -</h1>
        <h1>SIMULADOR DE CREDITO</h1>
 
        <h2>DATOS FINANCIEROS</h2>
        <label for="txtIngresos"><span class="label-icon icon-ingresos"></span> Ingresos:</label>
        <input type="text" id="txtIngresos" placeholder="Ejm. 1234">
 
        <label for="txtEgresos"><span class="label-icon icon-egresos"></span> Egresos:</label>
        <input type="text" id="txtEgresos" placeholder="Ejm. 1234">
 
        <p>Disponible: <span id="spnDisponible"></span></p>
        <p>Capacidad de pago mensual: <span id="spnCapacidadPago"></span></p>
 
        <h2>SOLICITUD DE CRÉDITO</h2>
        <label for="txtMonto"><span class="label-icon icon-monto"></span> Monto:</label>
        <input type="text" id="txtMonto" placeholder="Ejm. 1234">
 
        <label for="txtPlazo"><span class="label-icon icon-plazo"></span> Plazo en años:</label>
        <input type="text" id="txtPlazo" placeholder="Ejm. 5">
 
        <label for="txtTasaInteres"><span class="label-icon icon-tasa"></span> Tasa de interés:</label>
        <input type="text" id="txtTasaInteres" placeholder="Ejm. 10">
 
        <p>Interés a pagar: <span id="spnInteresPagar"></span></p>
        <p>Total préstamo: <span id="spnTotalPrestamo"></span></p>
        <p>Cuota mensual: <span id="spnCuotaMensual"></span></p>
        <p>Estado de crédito: <span id="spnEstadoCredito">ANALIZANDO...</span></p>
 
        <div class="buttons">
            <button id="btnCalcularCredito" onclick="calcular()">Calcular Crédito</button>
            <button id="btnReiniciar" onclick="reiniciar()">Reiniciar</button>
        </div>
    </div>
 
</body>
 
</html>
