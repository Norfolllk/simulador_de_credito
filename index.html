<!DOCTYPE html>
<html lang="es">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Crédito</title>
    <link rel="stylesheet" href="simulador.css">
    <script src="funciones.js"></script>
    <script src="simulador.js"></script>
</head>
 
<body>
    <div class="container">
        <img src="dog_bank.png" alt="Logo de la empresa" class="logo">
        <h1>- Banco L´Barbare -</h1>
        <h1>SIMULADOR DE CREDITO</h1>
 
        <h2>DATOS FINANCIEROS</h2>
        <label for="txtIngresos"><span class="label-icon icon-ingresos"></span> Ingresos:</label>
        <input type="number" id="txtIngresos" placeholder="Ejm. 1234" required min="0" step="0.01">
 
        <label for="txtArriendo"><span class="label-icon icon-arriendo"></span> Arriendo:</label>
        <input type="number" id="txtArriendo" placeholder="Ejm. 500" required min="0" step="0.01">

        <label for="txtAlimentacion"><span class="label-icon icon-alimentacion"></span> Alimentación:</label>
        <input type="text" id="txtAlimentacion" placeholder="Ejm. 300">

        <label for="txtVarios"><span class="label-icon icon-varios"></span> Varios:</label>
        <input type="text" id="txtVarios" placeholder="Ejm. 200">

        <p>Total Gastos: <span id="spnTotalGastos"></span></p>
        <label for="txtMonto"><span class="label-icon icon-monto"></span> Monto:</label>
        <input type="number" id="txtMonto" placeholder="Ejm. 1234" required min="0" step="0.01">
 
        <label for="txtPlazo"><span class="label-icon icon-plazo"></span> Plazo en años:</label>
        <input type="number" id="txtPlazo" placeholder="Ejm. 5" required min="1" max="30" step="1">
 
        <label for="txtTasaInteres"><span class="label-icon icon-tasa"></span> Tasa de interés:</label>
        <input type="number" id="txtTasaInteres" placeholder="Ejm. 10" required min="0" max="100" step="0.01">
 
        <p>Interés a pagar: <span id="spnInteresPagar"></span></p>
        <p>Total préstamo: <span id="spnTotalPrestamo"></span></p>
        <p>Cuota mensual: <span id="spnCuotaMensual"></span></p>
        <p>Estado de crédito: <span id="spnEstadoCredito">ANALIZANDO...</span></p>
 
        <div class="buttons">
            <button id="btnCalcularCredito" onclick="calcular()">Calcular Crédito</button>
            <button id="btnReiniciar" onclick="reiniciar()">Reiniciar</button>
        </div>
    </div>
 
</body>
 
</html>
